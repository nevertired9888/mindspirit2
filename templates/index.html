<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSprint - Квиз викторина</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <h1 class="logo">🧠 MindSprint</h1>
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Категории -->
        <div class="categories">
            <div class="category-tag" data-category="Наука">🔬 Наука</div>
            <div class="category-tag" data-category="История">📜 История</div>
            <div class="category-tag" data-category="Спорт">⚽ Спорт</div>
            <div class="category-tag" data-category="Музыка">🎵 Музыка</div>
            <div class="category-tag" data-category="Игры">🎮 Игры</div>
        </div>

        <!-- Вопросы -->
        <div class="questions-container">
            {% for q in questions %}
            <div class="question-card" data-question-id="{{ q.id }}" data-category="{{ q.category }}" data-correct="{{ q.correct }}">
                <div class="question-header">
                    <span class="question-number">Вопрос {{ loop.index }}</span>
                    <span class="category-badge">{{ q.category }}</span>
                </div>
                <div class="question-text">{{ q.question }}</div>
                <div class="options">
                    {% for option in q.options %}
                    <label class="option" data-value="{{ loop.index0 }}">
                        <input type="radio" name="q{{ q.id }}" value="{{ loop.index0 }}">
                        <span class="option-text">{{ option }}</span>
                    </label>
                    {% endfor %}
                </div>
                <button class="submit-btn" data-qid="{{ q.id }}">Ответить →</button>
                <div class="feedback-message"></div>
            </div>
            {% endfor %}
        </div>

        <!-- Кнопка сброса -->
        <div class="reset-container" style="display: none;" id="resetContainer">
            <button class="reset-btn" id="resetBtn">🔄 Начать заново</button>
        </div>
    </div>

    <script>
        // Прогресс-бар
        const progressBar = document.getElementById('progressBar');
        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / scrollHeight) * 100;
            progressBar.style.width = scrollPercent + '%';
        });

        let answeredCount = 0;
        const totalQuestions = {{ questions|length }};
        const resetContainer = document.getElementById('resetContainer');
        const questionsData = {{ questions|tojson }};

        function checkAllAnswered() {
            if (answeredCount === totalQuestions) {
                resetContainer.style.display = 'flex';
                showResults();
            }
        }

        function showResults() {
            let correctCount = 0;
            const allCards = document.querySelectorAll('.question-card');
            for (const card of allCards) {
                const questionId = parseInt(card.dataset.questionId);
                const question = questionsData.find(q => q.id === questionId);
                const selectedRadio = card.querySelector('input[type="radio"]:checked');
                if (selectedRadio) {
                    const selectedValue = parseInt(selectedRadio.value);
                    if (selectedValue === question.correct) {
                        correctCount++;
                    }
                }
            }
            const percent = Math.round((correctCount / totalQuestions) * 100);
            alert(`🎉 Результаты викторины!\n\nПравильных ответов: ${correctCount} из ${totalQuestions}\nПроцент: ${percent}%\n\nНажмите "Начать заново" чтобы пройти снова.`);
        }

        // Обработка ответов
        const submitButtons = document.querySelectorAll('.submit-btn');
        submitButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const card = this.closest('.question-card');
                const questionId = parseInt(card.dataset.questionId);
                const correctAnswer = parseInt(card.dataset.correct);
                const selectedRadio = card.querySelector(`input[name="q${questionId}"]:checked`);
                const feedbackDiv = card.querySelector('.feedback-message');

                if (!selectedRadio) {
                    feedbackDiv.textContent = '⚠️ Пожалуйста, выберите ответ!';
                    feedbackDiv.className = 'feedback-message wrong-feedback';
                    setTimeout(() => {
                        feedbackDiv.style.display = 'none';
                        feedbackDiv.className = 'feedback-message';
                    }, 2000);
                    return;
                }

                if (card.classList.contains('answered')) {
                    feedbackDiv.textContent = 'ℹ️ Вы уже ответили на этот вопрос!';
                    feedbackDiv.className = 'feedback-message wrong-feedback';
                    setTimeout(() => {
                        feedbackDiv.style.display = 'none';
                        feedbackDiv.className = 'feedback-message';
                    }, 2000);
                    return;
                }

                const selectedValue = parseInt(selectedRadio.value);
                const isCorrect = (selectedValue === correctAnswer);

                // Подсветка всех вариантов
                const allOptions = card.querySelectorAll('.option');
                allOptions.forEach(option => {
                    const optionValue = parseInt(option.dataset.value);
                    option.classList.add('disabled-option');
                    if (optionValue === correctAnswer) {
                        option.classList.add('correct-highlight');
                    } else if (optionValue === selectedValue && !isCorrect) {
                        option.classList.add('wrong-highlight');
                    }
                    const radio = option.querySelector('input[type="radio"]');
                    if (radio) radio.disabled = true;
                });

                if (isCorrect) {
                    feedbackDiv.textContent = '✅ Правильно! Отличная работа!';
                    feedbackDiv.className = 'feedback-message correct-feedback';
                } else {
                    const correctOption = card.querySelector(`.option[data-value="${correctAnswer}"] .option-text`);
                    feedbackDiv.textContent = `❌ Неправильно! Правильный ответ: "${correctOption.textContent}"`;
                    feedbackDiv.className = 'feedback-message wrong-feedback';
                }

                card.classList.add('answered');
                this.disabled = true;
                this.style.opacity = '0.5';
                this.style.cursor = 'not-allowed';

                answeredCount++;
                checkAllAnswered();
            });
        });

        // Сброс
        const resetBtn = document.getElementById('resetBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', async () => {
                try {
                    await fetch('/reset', { method: 'POST' });
                    window.location.reload();
                } catch (error) {
                    console.error('Error:', error);
                    window.location.reload();
                }
            });
        }

        // Анимация появления карточек
        const cards = document.querySelectorAll('.question-card');
        cards.forEach((card, index) => {
            card.style.animation = `slideIn 0.4s ease forwards`;
            card.style.animationDelay = `${index * 0.1}s`;
        });

        // Клик по категориям
        document.querySelectorAll('.category-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                const category = tag.dataset.category;
                const cards = document.querySelectorAll('.question-card');
                for (const card of cards) {
                    if (card.dataset.category === category) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        card.style.boxShadow = '0 0 0 3px #6366f1';
                        setTimeout(() => {
                            card.style.boxShadow = '';
                        }, 1000);
                        break;
                    }
                }
            });
        });

        // Hover-эффект на опциях
        document.querySelectorAll('.option').forEach(option => {
            option.addEventListener('mouseenter', () => {
                if (!option.classList.contains('disabled-option')) {
                    option.style.transform = 'translateX(8px)';
                }
            });
            option.addEventListener('mouseleave', () => {
                option.style.transform = '';
            });
        });
    </script>
</body>
</html>
